<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Test Backend Login</title>
      <style>
         body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
         }
         button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
         }
         pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
         }
      </style>
   </head>
   <body>
      <h1>🛠️ Test Backend Login</h1>

      <div style="margin-bottom: 20px">
         <button id="loginBtn">1. Login Google</button>
         <button id="checkSessionBtn">2. Cek Session (Who am I?)</button>
         <button id="testProtectedBtn">3. Test Protected API</button>
         <button id="logoutBtn">4. Logout</button>
      </div>

      <h3>Result:</h3>
      <pre id="result">Belum ada aktivitas...</pre>

      <script type="module">
         // Kita import langsung dari CDN yang support ES Modules
         import { createAuthClient } from 'https://esm.sh/better-auth/client';

         // Inisialisasi Client
         const authClient = createAuthClient({
            baseURL: 'http://localhost:8000',
         });

         const resultBox = document.getElementById('result');
         const showResult = (data) =>
            (resultBox.innerText = JSON.stringify(data, null, 2));

         // 1. LOGIN
         document.getElementById('loginBtn').onclick = async () => {
            await authClient.signIn.social({
               provider: 'google',
               callbackURL: 'http://localhost:8000', // Redirect balik ke sini
            });
         };

         // 2. CEK SESSION
         document.getElementById('checkSessionBtn').onclick = async () => {
            resultBox.innerText = 'Loading...';
            const { data, error } = await authClient.getSession();
            showResult(data || error);
         };

         // 3. TEST PROTECTED ROUTE
         document.getElementById('testProtectedBtn').onclick = async () => {
            resultBox.innerText = 'Fetching...';
            try {
               // Pastikan endpoint ini benar ada di routes kamu
               const res = await fetch(
                  'http://localhost:8000/api/url/get-list?status=a',
                  {
                     method: 'GET',
                  },
               );

               const text = await res.text();
               try {
                  showResult(JSON.parse(text));
               } catch {
                  resultBox.innerText = `Error / Not JSON: ${text}`;
               }
            } catch (err) {
               showResult({ error: err.message });
            }
         };

         // 4. LOGOUT
         document.getElementById('logoutBtn').onclick = async () => {
            await authClient.signOut();
            showResult({ message: 'Logged Out!' });
         };
      </script>
   </body>
</html>
