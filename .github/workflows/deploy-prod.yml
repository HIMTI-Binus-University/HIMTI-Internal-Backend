name: CI/CD Pipeline

# on:
#   workflow_dispatch:
on:
  push:
    branches: [ "dev" ] 

jobs:
  # --- TAHAP 1: CONTINUOUS INTEGRATION (CI) ---
  # Tahap ini jalan di server GitHub (Gratis).
  # Tujuannya memastikan kode bersih dari error sebelum menyentuh server cPanel.
  test-and-build:
    name: Test & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Sesuaikan versi Node kamu

      - name: Install Dependencies
        run: npm ci # Lebih cepat & aman daripada npm install untuk CI

      - name: Generate Prisma Client
        env:
          DATABASE_URL: "postgresql://dummy:password@localhost:5432/mydb?schema=public"
        run: npx prisma generate

      # Cek apakah kode bisa di-build (Compile TypeScript). 
      # Kalau ada error syntax, dia bakal FAIL di sini.
      - name: Build Check
        run: npm run build

      # (OPSIONAL) Kalau kamu punya Unit Testing (Jest/Mocha)
      # Uncomment baris di bawah ini:
      # - name: Run Tests
      #   run: npm test

  # --- TAHAP 2: CONTINUOUS DEPLOYMENT (CD) ---
  # Tahap ini login ke cPanel dan update aplikasi.
  # HANYA JALAN kalau tahap 'test-and-build' di atas SUKSES.
  deploy:
    name: Deploy to cPanel
    needs: test-and-build # <--- INI KUNCINYA (Dependency)
    runs-on: ubuntu-latest
    steps:
      - name: SSH to cPanel and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.SSH_KEY_CPANEL }}
          port: 22
          script: |
            # Masuk folder
            cd ${{ secrets.PROJECT_PATH }}
            
            # Tarik update
            git fetch origin dev
            git reset --hard origin/dev
            
            source /home/himtibin/nodevenv/HIMTI_API/24/bin/activate && cd /home/himtibin/HIMTI_API
            
            # Install & Build Ulang di Server
            npm install --production=false
            npx prisma generate
            npx prisma migrate deploy # Auto migrate DB (Hati-hati di production!)
            npm run build
            
            # Restart App
            mkdir -p tmp
            touch tmp/restart.txt
            echo "🚀 DEPLOYMENT SUCCESS!"
